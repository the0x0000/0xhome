    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">

    <!-- Подключаем html2canvas для скриншота и qrcode.js для генерации QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "JetBrains Mono", monospace;
            background-color: #000;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* РОДНЫЕ СТИЛИ ЛИСТОВКИ */
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 450px;
            background-color: white;
            margin: 20px auto;
            position: absolute;
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }
        
        .main {
            background-color: rgb(255, 255, 255);
            height: 270px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .logo {
            height: 97%;
            object-fit: contain;
        }
        
        .block {
            display: flex;
            height: 600px;
            width: 100%;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }
        
        .block-child {
            display: flex;
            justify-content: center;
            width: 100%;
            height: 100px;
        }
        
        .logo2 {
            width: 97%;
            height: 97%;
            object-fit: contain;
        }
        
        .block-child2 {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(0, 0, 0);
            width: 440px;
            height: 40px;
            border-radius: 20px;
            margin: 0 auto;
        }
        
        hr {
            border: none; 
            background-color: rgb(255, 255, 255); 
            height: 4px;
            border-radius: 4px; 
            width: 20%;
        }
        
        .hexc {
            font-family: "JetBrains Mono", monospace;
            font-weight: 700;
            font-size: 28px;
            color: white;
            letter-spacing: 4px;
            line-height: 1;
        }
        
        .block-child3 {
            display: flex;
            margin-top: 12px;
            background-color: rgb(0, 0, 0);
            width: 440px;
            height: 417px;
            border-radius: 20px;
            justify-content: center;
            align-items: center;
            margin-left: auto;
            margin-right: auto;
        }
        
        /* Стили для контейнера QR-кода */
        .qr-container {
            width: 375px;
            height: 375px;
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .qr-container img {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
        }
        
        /* ДИЗАЙН ТЕРМИНАЛА */
        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            z-index: 10;
        }

        .terminal {
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        }

        .terminal-header {
            background: #141414;
            padding: 12px 16px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
        }

        .terminal-title {
            color: #666;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .terminal-body {
            padding: 24px;
        }

        .prompt {
            color: #999;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .prompt span {
            color: #fff;
        }

        .download-btn {
            background: #141414;
            border: 1px solid #262626;
            color: #fff;
            font-family: "JetBrains Mono", monospace;
            font-size: 14px;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            text-align: center;
        }

        .download-btn:hover {
            background: #1a1a1a;
            border-color: #333;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

    <!-- Интерфейс -->
    <div class="container">
        <main>
            <div class="terminal">
                <div class="terminal-header">
                    <span class="terminal-title">./qr_generator.py</span>
                </div>
                <div class="terminal-body">
                    <p class="prompt">$ Листовка успешно сформирована. Вы можете сохранить её локально в формате PNG</p>
                    <button class="download-btn" id="downloadBtn">[ Скачать листовку ]</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 1. Парсим параметры из URL текущей страницы
        const urlParams = new URLSearchParams(window.location.search);
        let refCode = urlParams.get('code') || '0x0000'; // Если параметра нет, будет дефолт 0x0000

        // Санитария строки на всякий случай (убираем лишние пробелы/символы)
        refCode = encodeURIComponent(refCode.trim());

        // Конструируем финальный URL для QR-кода
        const targetUrl = `https://0xhome.online?ref=${refCode}`;

        // Обновляем инфу в терминале для контроля
        // document.getElementById('debugLink').innerText = targetUrl;

        // 2. Динамически меняем текстовые блоки 0x0001 на листовке
        document.querySelectorAll('.ref-holder').forEach(el => {
            el.innerText = refCode;
        });

        // 3. Генерируем сам QR-код внутри блока листовки
        const qrcode = new QRCode(document.getElementById("qrcode"), {
            text: targetUrl,
            width: 345,
            height: 345,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H // Максимальный уровень коррекции ошибок (чтобы лучше сканировалось)
        });

        // 4. Логика скачивания по кнопке
        document.getElementById('downloadBtn').addEventListener('click', function() {
            const element = document.getElementById('leafletTarget');
            
            element.style.opacity = '1';
            
            html2canvas(element, {
                backgroundColor: '#ffffff',
                scale: 2, 
                logging: false,
                useCORS: true
            }).then(canvas => {
                element.style.opacity = '0';
                
                const link = document.createElement('a');
                link.download = `leaflet_${refCode}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(error => {
                element.style.opacity = '0';
                console.error('Ошибка рендеринга:', error);
                alert('Ошибка генерации изображения.');
            });
        });
    </script>
