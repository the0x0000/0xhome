<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступ получен</title>
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="img/logo.svg" class="logo-img">
            </div>
        </header>
        <main>
            <div class="terminal">
                <div class="terminal-header">
                    <span class="terminal-title">./identity_assigned.py</span>
                </div>
                <div class="terminal-body">
                    <p class="prompt">[SYS] Access allowed</p>
                    <p class="prompt">[SYS] Перейдите в Telegram-бота</p>
                    <p class="prompt">> Ваш payload-ключ: 
                        <button onclick="copyKeyToClipboard()" id="key-display" style="background: none; border: 1px dashed #ff0055; color: #ff0055; font-family: monospace; font-size: 1.1em; padding: 2px 8px; cursor: pointer; font-weight: bold; letter-spacing: 1px;">Генерация...</button>
                    </p>
                    <div class="action-buttons">
                        <button onclick="closeSite()" class="action-btn">Выйти</button>
                        <button onclick="openTelegram()" class="action-btn">Открыть Telegram</button>
                    </div>
                </div>
            </div>
        </main>
        <footer>
            <p>[root@localhost] $</p>
        </footer>
    </div>
<script>
        let generatedKey = "";
        function generateOmenKey() {
            const nums = "0123456789";
            const alphabet = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const urlParams = new URLSearchParams(window.location.search);
            let refHex = urlParams.get('ref') || '0000';
            refHex = refHex.replace(/^0x/i, '').toUpperCase().padEnd(4, '0').slice(0, 4);
            let maskedRef = "";
            for (let i = 0; i < refHex.length; i++) {
                let index = alphabet.indexOf(refHex[i]);
                if (index !== -1) {
                    maskedRef += alphabet[(index + 3) % alphabet.length];
                } else {
                    maskedRef += refHex[i];
                }
            }
            let xxxx = Array.from({length: 4}, () => nums[Math.floor(Math.random() * nums.length)]).join('');
            let rawString = maskedRef + xxxx;
            let sum = 0;
            for (let i = 0; i < rawString.length; i++) {
                sum += rawString.charCodeAt(i);
            }
            let zzzz = (sum * 17).toString(16).toUpperCase().padStart(4, '0').slice(-4);
            return `OMEN-${maskedRef}-${xxxx}-${zzzz}`;
        }
        window.onload = function() {
            generatedKey = generateOmenKey();
            document.getElementById("key-display").innerText = generatedKey;
        };
        function copyKeyToClipboard() {
            navigator.clipboard.writeText(generatedKey).then(() => {
                const keyBtn = document.getElementById("key-display");
                keyBtn.innerText = "[ СКОПИРОВАНО ]";
                keyBtn.style.color = "#00ff66";
                keyBtn.style.borderColor = "#00ff66";
                setTimeout(() => {
                    keyBtn.innerText = generatedKey;
                    keyBtn.style.color = "#ff0055";
                    keyBtn.style.borderColor = "#ff0055";
                }, 1000);
            }).catch(err => console.log('Ошибка копирования', err));
        }
        function closeSite(){
            window.location.href = 'about:blank';
        }
        function openTelegram() {
            navigator.clipboard.writeText(generatedKey).catch(err => console.log('Ошибка', err));
            const telegramUrl = `https://t.me/omen_main_bot?start=${generatedKey}`;
            window.open(telegramUrl, '_blank');
        }
</script>
</body>
</html>
